name: notify

# LazyTheta notification worker — Telegram linking + due custom reminders.
# Hourly is plenty for date-based reminders; use the manual "Run workflow"
# button (workflow_dispatch) right after tapping Start in the bot to link
# your Telegram immediately instead of waiting for the next hourly run.

on:
  schedule:
    - cron: "0 * * * *"   # hourly, on the hour (UTC)
  workflow_dispatch: {}

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install --quiet "supabase>=2.0" requests
      - run: python notify_job.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
