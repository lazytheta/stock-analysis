[theme]
primaryColor = "#81b29a"
backgroundColor = "#fafaf8"
secondaryBackgroundColor = "#f5f4f0"
textColor = "#1a1a2e"
font = "sans serif"

[server]
maxUploadSize = 5
# Disable file watcher in production (reduces attack surface)
fileWatcherType = "none"
# Disable CORS for tighter security
enableCORS = false
# Enable XSRF protection
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
# toolbarMode = "minimal"
