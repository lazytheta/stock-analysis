<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: transparent; }
.yr-details {
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 6px;
}
.yr-details summary {
  font-weight: 600;
  cursor: pointer;
  list-style: none;
}
.yr-details summary::before {
  content: "\25B6";
  font-size: 0.6em;
  margin-right: 8px;
  display: inline-block;
  transition: transform 0.2s;
  vertical-align: middle;
}
.yr-details[open] summary::before {
  transform: rotate(90deg);
}
.yr-details summary::-webkit-details-marker { display: none; }
.mo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  margin-bottom: 2px;
}
.vr-btn {
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  background: transparent;
  border-width: 1.5px;
  border-style: solid;
  font-family: inherit;
}
.vr-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="container"></div>
<script>
// Streamlit component communication (no external lib needed)
function sendMsg(type, data) {
  window.parent.postMessage(Object.assign({isStreamlitMessage: true, type: type}, data), "*");
}
function setReady() { sendMsg("streamlit:componentReady", {apiVersion: 1}); }
function setHeight(h) { sendMsg("streamlit:setFrameHeight", {height: h}); }
function setValue(v) { sendMsg("streamlit:setComponentValue", {value: v}); }

var rendered = false;
window.addEventListener("message", function(e) {
  if (e.data.type !== "streamlit:render") return;
  var args = e.data.args;
  if (!args) return;
  render(args);
});

function render(args) {
  var container = document.getElementById("container");
  var html = "";
  var years = args.years; // [{yr, ret, color, months: [{mo, name, ret, color}]}]
  var card_bg = args.card;
  var border_c = args.border;
  var text_c = args.text;
  var accent = args.accent;

  for (var i = 0; i < years.length; i++) {
    var y = years[i];
    html += '<details class="yr-details" style="background:' + card_bg + ';border:1px solid ' + border_c + ';border-left:3px solid ' + y.color + '">';
    html += '<summary style="color:' + text_c + '">' + y.yr + ' \u2014 <span style="color:' + y.color + '">' + y.ret + '</span></summary>';
    html += '<div style="margin-top:8px">';
    for (var j = 0; j < y.months.length; j++) {
      var m = y.months[j];
      html += '<div class="mo-row" style="border-left:3px solid ' + m.color + '">';
      html += '<div><span style="font-weight:600;color:' + text_c + '">' + m.name + '</span> &nbsp; ';
      html += '<span style="color:' + m.color + ';font-weight:600">' + m.ret + '</span></div>';
      html += '<button class="vr-btn" data-r="' + y.yr + '_' + m.mo + '" style="border-color:' + accent + ';color:' + accent + '">View Report</button>';
      html += '</div>';
    }
    html += '</div></details>';
  }
  container.innerHTML = html;

  // Attach click handlers
  var btns = container.querySelectorAll(".vr-btn");
  btns.forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      setValue(this.dataset.r);
    });
  });

  // Set height after render
  setTimeout(function() {
    setHeight(document.body.scrollHeight + 10);
  }, 50);

  // Also update height when details open/close
  container.querySelectorAll("details").forEach(function(d) {
    d.addEventListener("toggle", function() {
      setTimeout(function() { setHeight(document.body.scrollHeight + 10); }, 50);
    });
  });
}

setReady();
</script>
</body>
</html>
